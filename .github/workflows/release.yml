name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build universal binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/universal/release
          lipo -create \
            target/aarch64-apple-darwin/release/lite-dev-cpp \
            target/x86_64-apple-darwin/release/lite-dev-cpp \
            -output target/universal/release/lite-dev-cpp

      - name: Package app bundle
        run: |
          APP_DIR="dist/Lite Dev-C++.app"
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp packaging/macos/Info.plist "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$APP_DIR/Contents/Info.plist"
          cp target/universal/release/lite-dev-cpp "$APP_DIR/Contents/MacOS/lite-dev-cpp"
          chmod +x "$APP_DIR/Contents/MacOS/lite-dev-cpp"
          ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "Lite-Dev-Cpp-macOS-universal.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lite-Dev-Cpp-macOS-universal
          path: Lite-Dev-Cpp-macOS-universal.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: cargo build --release

      - name: Package Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/Lite-Dev-Cpp-windows-x86_64" | Out-Null
          Copy-Item "target/release/lite-dev-cpp.exe" "dist/Lite-Dev-Cpp-windows-x86_64/Lite-Dev-Cpp.exe"
          Copy-Item "README.md" "dist/Lite-Dev-Cpp-windows-x86_64/README.md"
          Compress-Archive -Path "dist/Lite-Dev-Cpp-windows-x86_64/*" -DestinationPath "Lite-Dev-Cpp-windows-x86_64.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lite-Dev-Cpp-windows-x86_64
          path: Lite-Dev-Cpp-windows-x86_64.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-assets/*.zip \
            --title "Lite Dev-C++ $TAG_NAME" \
            --notes "Prebuilt Lite Dev-C++ packages for macOS and Windows."
